# Operational notes
source_notes: |
  - Snapshot 2026-05-25 via vnstock VCI sponsor (silver tier, account
    Hung Thinh Nguyen). Drift risk: VN30/HNX30 rebalance quarterly (HOSE/HNX
    publishes new constituents); mcap ranks shift continuously.
  - Universe is FROZEN per Phase 0 alignment. Re-cut requires explicit operator approval.
  - Quarterly re-balance review: check VN30/HNX30 index membership changes;
    re-rank HOSE top50 and UPCOM top10 by trailing-3-month mcap median.
  - Delistings during backfill window (2019-): keep ticker in universe with
    `effective_to` flag in ticker_master_v1_seed.csv (companion file).
  - Survivorship bias mitigation: query historical mcap rankings per year,
    not current snapshot.
  - HOSE top50 filter excludes ETFs/funds (FUEVFVND etc) by type=='stock';
    BAF replaced FUEVFVND vs raw rank for stock-only constraint.
